<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>

    <style>
        body, html {
            margin: 0;
            justify-content: center;
            align-items: center;
        }

        .centered {
            display: inline-flex;
            justify-content: center;
            width: 100%;
            margin-top: 50px;
        }

        .mycontainer {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            min-height: 300px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
        }

        .error-message {
            color: red;
            font-size: 0.8rem;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .visible {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 0.5rem;
            color: #555;
        }

        input {
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background-color: #1877f2;
            color: white;
            padding: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

            button:hover {
                background-color: #166fe5;
            }

        .register-link {
            text-align: center;
            margin-top: 1rem;
        }

            .register-link a {
                color: #1877f2;
                text-decoration: none;
            }

                .register-link a:hover {
                    text-decoration: underline;
                }
    </style>
</head>
<body>

    <div class="centered">
        <div class="mycontainer">
            <h1>Авторизация</h1>

            <!-- action укажи свой -->
            <form id="login-form" method="post" action="/auth">

                <label for="login">Логин:</label>
                <input type="text" id="login" name="login" required>

                <div id="login-fields" class="visible">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password">

                    <a href="#" id="show-password-recovery">Восстановить пароль</a>

                    <button type="submit" name="action" value="login">
                        Войти
                    </button>
                </div>

                <div id="recovery-fields" class="hidden">
                    <label for="email">Почта:</label>
                    <input type="email" id="email" name="email" placeholder="Введите вашу почту">

                    <label for="newPassword">Новый пароль:</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Введите новый пароль">

                    <button type="submit" name="action" value="sendCode">
                        Прислать код
                    </button>

                    <label for="authCode">Код подтверждения:</label>
                    <input type="text" id="authCode" name="code" placeholder="Введите код">

                    <a href="#" id="back-to-login">Вернуться к авторизации</a>

                    <button type="submit" name="action" value="changePassword">
                        Сменить пароль
                    </button>
                </div>
            </form>

            <!-- сюда можно выводить ошибку с сервера -->
            <h3 class="error-message" id="error-message"></h3>

            <div class="register-link">
                <a href="/registration">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('show-password-recovery').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('login-fields').classList.add('hidden');
        document.getElementById('login-fields').classList.remove('visible');

        document.getElementById('recovery-fields').classList.remove('hidden');
        document.getElementById('recovery-fields').classList.add('visible');
    });

    document.getElementById('back-to-login').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('recovery-fields').classList.add('hidden');
        document.getElementById('recovery-fields').classList.remove('visible');

        document.getElementById('login-fields').classList.remove('hidden');
        document.getElementById('login-fields').classList.add('visible');
    });
    </script>

</body>
</html>
